# Ocean Heat Stress Index - nightly data refresh
#
# Runs on GitHub's servers every night at 09:00 UTC. Fetches OISST
# from NOAA ERDDAP and the NOAAGlobalTemp ocean series from NCEI,
# runs Hobday MHW detection, and commits refreshed JSON to ./data/.

name: Update OHSI data

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy scipy
          pip install git+https://github.com/ecjoliver/marineHeatWaves.git || echo "marineHeatWaves install failed, script will use simplified fallback"

      - name: Run preprocessing
        run: python ohsi_preprocessing.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes. Nothing to commit."
          else
            git commit -m "auto-update ohsi data $(date -u +%Y-%m-%d)"
            git push
          fi
